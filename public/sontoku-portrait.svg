<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <circle cx="100" cy="100" r="100" fill="#f5f1ec"/>
  <circle cx="100" cy="100" r="96" fill="#faf8f5" stroke="#d4c8b8" stroke-width="1"/>
