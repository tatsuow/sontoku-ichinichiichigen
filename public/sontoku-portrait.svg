  <ellipse cx="100" cy="78" rx="28" ry="32" fill="#c4b8a6"/>
  <!-- 顔 -->
  <ellipse cx="100" cy="72" rx="22" ry="26" fill="#e8ddd0"/>
  <!-- 髷（まげ） -->
  <ellipse cx="100" cy="50" rx="10" ry="6" fill="#6b5344"/>
  <rect x="96" y="44" width="8" height="12" rx="3" fill="#6b5344"/>
  <!-- 目 -->
  <ellipse cx="91" cy="70" rx="3" ry="1.5" fill="#3d3428"/>
  <ellipse cx="109" cy="70" rx="3" ry="1.5" fill="#3d3428"/>
  <!-- 眉 -->
  <path d="M86 66 Q91 63 96 66" stroke="#3d3428" stroke-width="1.2" fill="none"/>
  <path d="M104 66 Q109 63 114 66" stroke="#3d3428" stroke-width="1.2" fill="none"/>
